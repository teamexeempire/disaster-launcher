name: CMake

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: RelWithDebInfo

jobs:
   windows:
    name: win-${{ matrix.buildtype }}
    runs-on: windows-latest
    strategy:
      matrix:
        buildtype: [ Debug, RelWithDebInfo, MinSizeRel ]
        mindeps: [ false ]
        include:
          - buildtype: RelWithDebInfo
            mindeps: true
    steps:
      - uses: actions/checkout@v1
        with:
          submodules: true
          
      - name: Fetch CMake
        uses: lukka/get-cmake@v3.21.2
        
      - name: Fetch VCPKG
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: 'd765306b074717dea8dc1c4723e1b025acb61c2d'
          
      - name: Build
        uses: ilammy/msvc-dev-cmd@v1
        uses: lukka/run-cmake@v3
        with:
          cmakeAppendedArgs: -A x64
          buildDirectory: ${{ runner.workspace }}/build
          cmakeBuildType: ${{ matrix.buildtype }}

      - name: Upload build
        uses: actions/upload-artifact@v2
        with:
          name: windows-${{ matrix.buildtype }}-x86_64
          path: ${{ runner.workspace }}/build
      
   ubuntu:
    name: linux-${{ matrix.buildtype }}
    runs-on: ubuntu-20.04
    strategy:
      matrix:
        buildtype: [ Debug, RelWithDebInfo, MinSizeRel ]
    steps:
      - uses: actions/checkout@v1
        with:
          submodules: true

      - name: Fetch CMake
        uses: lukka/get-cmake@v3.21.2

      - name: Fetch dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libjansson-dev
          sudo apt-get install libsdl2-dev
          sudo apt-get install libcurl4-gnutls-dev

      - name: Build
        uses: lukka/run-cmake@v3
        env:
          CC: gcc-9
          CXX: g++-9
        with:
          cmakeAppendedArgs: -DCMAKE_C_COMPILER=gcc-9 -DCMAKE_CXX_COMPILER=g++-9 -A x64
          buildDirectory: ${{ runner.workspace }}/build
          cmakeBuildType: ${{ matrix.buildtype }}

      - name: Upload build
        uses: actions/upload-artifact@v2
        with:
          name: linux-${{ matrix.buildtype }}-x86_64
          path: ${{ runner.workspace }}/build
